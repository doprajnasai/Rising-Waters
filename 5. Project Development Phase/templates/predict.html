<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flood Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ================= Navigation ================= -->

<nav>

    <div class="logo">

        Floods Prediction

    </div>

    <ul>

        <li><a href="/">Home</a></li>

        <li><a href="/predict" class="active">Predict Floods</a></li>

    </ul>

</nav>

<!-- ================= Prediction Section ================= -->

<section class="prediction-page">

    <div class="prediction-overlay">

        <div class="prediction-card">

            <h1>Flood Prediction</h1>

            <p class="subtitle">

                Enter the weather information below to predict
                whether flooding is likely to occur.

            </p>

            <form action="/prediction" method="POST">

                <div class="form-grid">

                    <div class="input-box">

                        <label>🌡 Temperature (°C)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="60"
                               name="temp"
                               placeholder="Example: 30"
                               required>

                    </div>

                    <div class="input-box">

                        <label>💧 Humidity (%)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="100"
                               name="humidity"
                               placeholder="Example: 75"
                               required>

                    </div>

                    <div class="input-box">

                        <label>☁ Cloud Cover (%)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="100"
                               name="cloud"
                               placeholder="Example: 40"
                               required>

                    </div>

                    <div class="input-box">

                        <label>🌧 Annual Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="10000"
                               name="annual"
                               placeholder="Example: 3200"
                               required>

                    </div>

                    <div class="input-box">

                        <label>🌦 Jan-Feb Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="3000"
                               name="janfeb"
                               placeholder="Example: 250"
                               required>

                    </div>

                    <div class="input-box">

                        <label>🌦 Mar-May Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="3000"
                               name="marmay"
                               placeholder="Example: 650"
                               required>

                    </div>

                    <div class="input-box">

                        <label>🌧 Jun-Sep Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="6000"
                               name="junsep"
                               placeholder="Example: 3100"
                               required>

                    </div>

                    <div class="input-box">

                        <label>🌦 Oct-Dec Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="3000"
                               name="octdec"
                               placeholder="Example: 250"
                               required>

                    </div>

                    <div class="input-box">

                        <label>☔ Average June Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="1000"
                               name="avgjune"
                               placeholder="Example: 350"
                               required>

                    </div>

                    <div class="input-box">

                        <label>📍 Subdivision Rainfall (mm)</label>

                        <input type="number"
                               step="0.1"
                               min="0"
                               max="5000"
                               name="sub"
                               placeholder="Example: 650"
                               required>

                    </div>

                </div>

                <button type="submit" class="predict-btn">

                    Predict Flood

                </button>

            </form>

            {% if prediction %}

            <div class="result-card {{ result_class }}">

                <h2>Prediction Result</h2>

                <h1>{{ prediction }}</h1>

                <a href="/predict" class="again-btn">

                    Predict Again

                </a>

            </div>

            {% endif %}

        </div>

    </div>

</section>

</body>

</html>
